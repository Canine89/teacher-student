<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1학년 8반 학생 관리</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @font-face {
      font-family: "Paperlogy";
      src: url("https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-4Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Paperlogy";
      src: url("https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-5Medium.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Paperlogy";
      src: url("https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-6SemiBold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --canvas: #fbfaf9;
      --paper: #ffffff;
      --panel: #f8f7f4;
      --soft-fill: #f6f4ef;
      --ink: #343433;
      --deep: #121212;
      --muted: #848281;
      --body: #474645;
      --faint: #c6c6c6;
      --ember: #ff3e00;
      --meadow: #00ca48;
      --sky: #0090ff;
      --sun: #ffbb26;
      --sun-ink: #d48f00;
      --coral: #ff513f;
      --flamingo: #ff58ae;
      --stone-inset: color(display-p3 0.949 0.941 0.929) 0px 0px 0px 1px inset;
      --nav-line: rgba(0, 0, 0, 0.04) 0px 0px 0px 1px;
      --shadow-soft: 0 20px 60px rgba(18, 18, 18, 0.08);
      --radius-card: 10px;
      --radius-panel: 12px;
      --radius-modal: 24px;
      --pill: 32px;
      --family: "Paperlogy", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --ui: "Paperlogy", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--ui);
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--ui);
      font-weight: 400;
      overflow-x: hidden;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 50;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--canvas);
      box-shadow: var(--nav-line);
    }

    .nav-inner {
      width: min(1180px, calc(100vw - 40px));
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .brand svg {
      width: 34px;
      height: 34px;
      overflow: visible;
      flex: 0 0 auto;
      animation: bob 4.2s cubic-bezier(0.19, 1, 0.22, 1) infinite;
    }

    .tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px;
      background: var(--soft-fill);
      border-radius: var(--pill);
    }

    .tab {
      min-width: 86px;
      height: 38px;
      padding: 0 17px;
      background: transparent;
      color: var(--ink);
      border: 0;
      border-radius: var(--pill);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .tab[aria-selected="true"] {
      background: var(--paper);
      color: var(--ember);
      box-shadow: var(--stone-inset);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .date-pill {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: var(--soft-fill);
      border-radius: var(--pill);
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      border: 0;
      border-radius: var(--pill);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .btn-dark {
      background: var(--deep);
      color: var(--paper);
      box-shadow: none;
    }

    .btn-dark:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(18, 18, 18, 0.16);
    }

    .btn-light {
      background: var(--soft-fill);
      color: var(--ink);
      box-shadow: var(--stone-inset);
    }

    .btn-ghost {
      min-width: 42px;
      padding: 0;
      background: transparent;
      color: var(--ink);
    }

    .page {
      width: min(1180px, calc(100vw - 40px));
      min-height: calc(100vh - 132px);
      margin: 0 auto;
      padding: 112px 0 56px;
    }

    .hero {
      position: relative;
      min-height: 310px;
      display: grid;
      align-items: center;
      margin: 10px 0 44px;
      padding: 48px 0 56px;
      overflow: hidden;
      isolation: isolate;
      border-radius: 22px;
      box-shadow: var(--stone-inset);
      background: var(--canvas);
    }

    .hero-art {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.96;
      pointer-events: none;
      user-select: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(90deg, rgba(251, 250, 249, 0.98) 0%, rgba(251, 250, 249, 0.9) 38%, rgba(251, 250, 249, 0.36) 78%, rgba(251, 250, 249, 0.12) 100%);
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      width: min(780px, 100%);
      padding-left: 34px;
    }

    .hero h1 {
      margin: 0;
      color: var(--ink);
      font-family: var(--family);
      font-size: 68px;
      font-weight: 500;
      line-height: 1.09;
      letter-spacing: -2.11px;
    }

    .hero h1 span {
      color: var(--ember);
    }

    .mobile-break {
      display: none;
    }

    .hero p {
      width: min(560px, 100%);
      margin: 22px 0 0;
      color: var(--body);
      font-size: 17px;
      font-weight: 400;
      line-height: 1.7;
      letter-spacing: 0;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .section-head h2,
    .attendance-title {
      margin: 0;
      color: var(--deep);
      font-family: var(--family);
      font-size: 44px;
      font-weight: 500;
      line-height: 1.12;
      letter-spacing: -1.14px;
    }

    .section-head p,
    .attendance-summary {
      margin: 8px 0 0;
      color: var(--body);
      font-size: 15px;
      line-height: 1.6;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      min-width: 0;
      background: var(--paper);
      box-shadow: var(--stone-inset);
      border-radius: var(--radius-card);
    }

    .stat-card {
      min-height: 204px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .stat-icon {
      width: 68px;
      height: 68px;
      overflow: visible;
      flex: 0 0 auto;
    }

    .stat-value {
      margin: 0;
      color: var(--deep);
      font-size: 44px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -1.14px;
    }

    .stat-label {
      margin: 9px 0 0;
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
    }

    .stat-detail {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .indicator {
      width: 9px;
      height: 9px;
      display: inline-block;
      border-radius: 50%;
      background: var(--meadow);
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag,
    .number-chip,
    .filter-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      white-space: nowrap;
    }

    .tag {
      min-height: 26px;
      padding: 0 9px;
      border-radius: 7px;
      background: var(--sun);
      color: var(--sun-ink);
      font-size: 12px;
      font-weight: 500;
    }

    .tag::before {
      content: "";
      width: 6px;
      height: 6px;
      margin-right: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.55;
    }

    .number-chip {
      min-height: 26px;
      padding: 0 8px;
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font-size: 13px;
      font-weight: 500;
    }

    .activity-section {
      margin-top: 42px;
    }

    .activity-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(280px, 1fr);
      gap: 18px;
      overflow-x: auto;
      padding: 2px 2px 10px;
      scroll-snap-type: x proximity;
    }

    .activity-card {
      min-height: 138px;
      padding: 24px;
      scroll-snap-align: start;
    }

    .activity-person {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      overflow: visible;
      flex: 0 0 auto;
    }

    .avatar.small {
      width: 44px;
      height: 44px;
    }

    .avatar.tiny {
      width: 34px;
      height: 34px;
    }

    .activity-name,
    .student-name,
    .row-name {
      color: var(--ink);
      font-weight: 600;
      letter-spacing: 0;
    }

    .activity-name { font-size: 15px; }
    .student-name { margin: 0; font-size: 19px; line-height: 1.25; }
    .row-name { font-size: 15px; }

    .activity-date,
    .student-meta,
    .row-number {
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .activity-text {
      margin: 0;
      color: var(--body);
      font-size: 14px;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      align-items: center;
      gap: 14px;
      margin: 2px 0 24px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input,
    .sort-select,
    .memo-textarea {
      width: 100%;
      background: var(--paper);
      color: var(--ink);
      border: 0;
      box-shadow: var(--stone-inset);
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input {
      height: 48px;
      padding: 0 16px 0 45px;
      border-radius: var(--radius-card);
      font-size: 14px;
    }

    .search-input:focus,
    .sort-select:focus,
    .memo-textarea:focus {
      box-shadow: var(--stone-inset), 0 0 0 3px rgba(0, 144, 255, 0.12);
    }

    .filter-group {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      background: var(--soft-fill);
      border-radius: var(--pill);
    }

    .filter-chip {
      height: 38px;
      min-width: 52px;
      padding: 0 14px;
      border-radius: var(--pill);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .filter-chip.active {
      background: var(--paper);
      color: var(--ink);
      box-shadow: var(--stone-inset);
    }

    .sort-select {
      height: 48px;
      min-width: 150px;
      padding: 0 14px;
      border-radius: var(--radius-card);
      font-size: 14px;
      appearance: none;
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }

    .student-card {
      min-height: 236px;
      padding: 24px;
      text-align: left;
      border: 0;
      transition: all 0.2s ease;
    }

    .student-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--stone-inset), 0 18px 40px rgba(18, 18, 18, 0.07);
    }

    .student-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .student-info-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .student-info-line svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .student-card .chip-list {
      margin-top: 15px;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 48px 24px;
      color: var(--muted);
      text-align: center;
      background: var(--panel);
      border-radius: var(--radius-panel);
    }

    .attendance-toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    .attendance-list {
      display: grid;
      gap: 12px;
    }

    .attendance-row {
      min-height: 76px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 16px 24px;
      background: var(--panel);
      border-radius: var(--radius-panel);
    }

    .row-person {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .row-text {
      min-width: 0;
    }

    .row-text strong,
    .row-text span {
      display: block;
    }

    .attendance-toggles {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-btn {
      height: 38px;
      min-width: 62px;
      padding: 0 14px;
      border: 0;
      border-radius: var(--pill);
      background: var(--soft-fill);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .status-btn.active {
      color: var(--deep);
    }

    .status-btn.present.active {
      background: var(--meadow);
      color: var(--paper);
    }

    .status-btn.late.active {
      background: var(--sun);
      color: var(--deep);
    }

    .status-btn.absent.active {
      background: var(--coral);
      color: var(--paper);
    }

    .modal-root[hidden] {
      display: none;
    }

    .modal-root {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.4);
    }

    .modal-card {
      position: relative;
      width: min(560px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      overflow-y: auto;
      padding: 36px;
      background: var(--paper);
      box-shadow: var(--stone-inset), var(--shadow-soft);
      border-radius: var(--radius-modal);
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
    }

    .modal-head {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      padding-right: 42px;
    }

    .modal-head .avatar {
      width: 96px;
      height: 96px;
    }

    .modal-title {
      margin: 0;
      color: var(--ink);
      font-size: 26px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .modal-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .detail-list {
      display: grid;
      gap: 10px;
      margin: 26px 0;
    }

    .detail-row,
    .note-item {
      background: var(--panel);
      border-radius: var(--radius-panel);
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 14px;
      color: var(--body);
      font-size: 14px;
    }

    .detail-row svg {
      width: 18px;
      height: 18px;
      color: var(--ink);
      flex: 0 0 auto;
    }

    .detail-row a {
      color: var(--body);
      text-decoration: none;
    }

    .notes-title {
      margin: 0 0 12px;
      color: var(--deep);
      font-size: 16px;
      font-weight: 600;
    }

    .note-list {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .note-item {
      padding: 14px 15px;
    }

    .note-date {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .note-content {
      margin: 0;
      color: var(--body);
      font-size: 14px;
      line-height: 1.55;
    }

    .memo-form {
      display: grid;
      gap: 12px;
    }

    .ai-panel {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
      padding: 16px;
      background: var(--panel);
      border-radius: var(--radius-panel);
    }

    .ai-panel-title {
      margin: 0;
      color: var(--deep);
      font-size: 14px;
      font-weight: 600;
    }

    .keyword-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-btn {
      min-height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: var(--pill);
      background: var(--paper);
      color: var(--body);
      box-shadow: var(--stone-inset);
      font-size: 13px;
      font-weight: 500;
    }

    .keyword-btn.active {
      background: var(--deep);
      color: var(--paper);
      box-shadow: none;
    }

    .ai-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ai-status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .memo-textarea {
      min-height: 116px;
      padding: 14px;
      resize: vertical;
      border-radius: var(--radius-card);
      line-height: 1.55;
    }

    .memo-form .btn {
      justify-self: end;
    }

    .site-footer {
      width: min(1180px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 0 0 34px;
      color: var(--faint);
      font-size: 13px;
      font-weight: 400;
      text-align: center;
    }

    .loading-state {
      display: grid;
      place-items: center;
      min-height: 420px;
      color: var(--body);
      font-size: 16px;
      font-weight: 500;
      text-align: center;
    }

    .login-screen {
      min-height: calc(100vh - 132px);
      display: grid;
      place-items: center;
      padding: 112px 20px 56px;
    }

    .login-card {
      width: min(520px, 100%);
      padding: 36px;
      background: var(--paper);
      box-shadow: var(--stone-inset), var(--shadow-soft);
      border-radius: var(--radius-modal);
      text-align: center;
    }

    .login-card svg {
      width: 86px;
      height: 86px;
      margin-bottom: 16px;
      overflow: visible;
    }

    .login-card h1 {
      margin: 0;
      color: var(--deep);
      font-family: var(--family);
      font-size: 44px;
      font-weight: 500;
      line-height: 1.12;
      letter-spacing: -1.14px;
    }

    .login-card p {
      margin: 14px auto 24px;
      color: var(--body);
      font-size: 15px;
      line-height: 1.65;
    }

    .login-error {
      min-height: 20px;
      margin-top: 14px;
      color: var(--coral);
      font-size: 13px;
      line-height: 1.5;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      45% { transform: translateY(-8px) rotate(-2deg); }
      70% { transform: translateY(3px) rotate(1.5deg); }
    }

    @media (max-width: 1023px) {
      .nav-inner {

  <script>
    const state = {
      activeTab: 'dashboard',
      students: [],
      attendance: {},
      notes: {},
      isLoading: true,
      loadError: '',
      searchQuery: '',
      genderFilter: 'all',
      sortBy: 'number',
      selectedStudentId: null
    };

    const app = document.getElementById('app');
    const modalRoot = document.getElementById('modalRoot');
    const loginScreen = document.getElementById('loginScreen');
    const loginError = document.getElementById('loginError');
    const GOOGLE_TOKEN_KEY = 'teacherStudentGoogleCredential';
    const today = new Date();
    const todayLabel = new Intl.DateTimeFormat('ko-KR', {
      month: 'long',
      day: 'numeric',
      weekday: 'long'
    }).format(today);
    document.getElementById('todayLabel').textContent = todayLabel;

    function isLoggedIn() {
      return Boolean(sessionStorage.getItem(GOOGLE_TOKEN_KEY));
    }

    function showLogin() {
      app.hidden = true;
      loginScreen.hidden = false;
    }

    function showApp() {
      loginScreen.hidden = true;
      app.hidden = false;
    }

    window.handleGoogleLogin = function handleGoogleLogin(response) {
      if (!response || !response.credential) {
        loginError.textContent = 'Google 로그인 응답을 확인하지 못했습니다.';
        return;
      }

      sessionStorage.setItem(GOOGLE_TOKEN_KEY, response.credential);
      showApp();

      if (state.isLoading && state.students.length === 0) {
        render();
        loadStudents();
      }
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && inQuotes && next === '"') {
          field += '"';
          index += 1;
          continue;
        }

        if (char === '"') {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === ',' && !inQuotes) {
          row.push(field);
          field = '';
          continue;
        }

        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') index += 1;
          row.push(field);
          if (row.some((cell) => cell.trim() !== '')) rows.push(row);
          row = [];
          field = '';
          continue;
        }

        field += char;
      }

      row.push(field);
      if (row.some((cell) => cell.trim() !== '')) rows.push(row);
      return rows;
    }

    function normalizeGender(value) {
      const gender = value.trim().toUpperCase();
      if (gender === '남' || gender === 'M' || gender === 'MALE') return 'M';
      if (gender === '여' || gender === 'F' || gender === 'FEMALE') return 'F';
      return gender || 'M';
    }

    function parseNotesCell(value) {
      return String(value || '')
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const match = line.match(/^(\d{4}-\d{2}-\d{2})\s*\|\s*(.+)$/);
          if (match) return { date: match[1], content: match[2].trim() };
          return { date: todayIso(), content: line };
        });
    }

    function studentsFromCsv(text) {
      const rows = parseCsv(text);
      const header = rows.shift();
      if (!header || rows.length === 0) return [];

      return rows.map((row) => {
        const student = Object.fromEntries(header.map((column, index) => [column.trim(), (row[index] || '').trim()]));
        const allergyText = student['알레르기/특이사항'] || student.allergies || '';
        return {
          id: Number(student['번호'] || student.id),
          name: student['이름'] || student.name,
          gender: normalizeGender(student['성별'] || student.gender || ''),
          birthday: student['생일'] || student.birthday,
          guardian: student['보호자 연락처'] || student.guardian || '',
          allergies: allergyText
            ? allergyText.split(/[;|/·]/).map((item) => item.trim()).filter(Boolean)
            : [],
          notes: parseNotesCell(student['상담기록'] || '')
        };
      }).filter((student) => student.id && student.name);
    }

    function initializeStudentState(students) {
      state.students = students;
      state.attendance = Object.fromEntries(students.map((student) => [student.id, 'present']));
      state.notes = Object.fromEntries(students.map((student) => [student.id, student.notes ? [...student.notes] : []]));
      state.selectedStudentId = null;
    }

    async function requestJson(urls, options = {}) {
      const candidates = Array.isArray(urls) ? urls : [urls];
      let lastError = null;

      for (const url of candidates) {
        try {
          const response = await fetch(url, options);
          const text = await response.text();
          let data = {};

          try {
            data = text ? JSON.parse(text) : {};
          } catch (error) {
            throw new Error(`JSON 응답이 아닙니다: ${text.slice(0, 80)}`);
          }

          if (!response.ok) {
            throw new Error(data.error || `${url} ${response.status}`);
          }

          return data;
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error('요청에 실패했습니다.');
    }

    async function loadStudents() {
      try {
        const result = await requestJson(['/api/students', '/.netlify/functions/students'], { cache: 'no-store' });
        if (!Array.isArray(result.students) || result.students.length === 0) {
          throw new Error('구글 스프레드시트에 학생 데이터가 없습니다.');
        }
        initializeStudentState(result.students);
        state.loadError = '';
      } catch (error) {
        state.loadError = error.message || '구글 스프레드시트 학생 데이터를 읽지 못했습니다.';
      } finally {
        state.isLoading = false;
        render();
      }
    }

    function avatarSymbol(id) {
      return ['#blob-orange', '#blob-green', '#blob-blue', '#blob-yellow'][id % 4];
    }

    function avatar(id, sizeClass = '') {
      return `<svg class="avatar ${sizeClass}" viewBox="0 0 96 96" aria-hidden="true"><use href="${avatarSymbol(id)}"></use></svg>`;
    }

    function genderLabel(gender) {
      return gender === 'M' ? '남' : '여';
    }

    function birthdayLabel(dateString) {
      const date = new Date(`${dateString}T00:00:00`);
      return `${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    function todayIso() {
      const local = new Date();
      const year = local.getFullYear();
      const month = String(local.getMonth() + 1).padStart(2, '0');
      const day = String(local.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function attendanceCounts() {
      return Object.values(state.attendance).reduce((acc, status) => {
        acc[status] += 1;
        return acc;
      }, { present: 0, late: 0, absent: 0 });
    }

    function attendanceRate() {
      if (state.students.length === 0) return 0;
      const counts = attendanceCounts();
      return Math.round(((counts.present + counts.late * 0.5) / state.students.length) * 100);
    }

    function allNotes() {
      return state.students.flatMap((student) => {
        return (state.notes[student.id] || []).map((note) => ({
          ...note,
          student
        }));
      }).sort((a, b) => b.date.localeCompare(a.date));
    }

    function allergyStudents() {
      return state.students.filter((student) => student.allergies.length > 0);
    }

    function genderCounts() {
      return state.students.reduce((acc, student) => {
        if (student.gender === 'M') acc.male += 1;
        if (student.gender === 'F') acc.female += 1;
        return acc;
      }, { male: 0, female: 0 });
    }

    function renderDashboard() {
      const counts = attendanceCounts();
      const rate = attendanceRate();
      const allergyList = allergyStudents();
      const notes = allNotes();
      const recentNotes = notes.slice(0, 3);
      const genders = genderCounts();

      return `
        <section class="hero" aria-labelledby="hero-title">
          <img class="hero-art" src="assets/classroom-hero.png" alt="">
          <div class="hero-copy">
            <h1 id="hero-title">오늘도 <span>우리 반</span>,<br class="mobile-break"> 안녕!</h1>
            <p>1학년 8반 · ${state.students.length}명의 작은 친구들</p>
          </div>
        </section>

        <section aria-labelledby="dashboard-title">
          <div class="section-head">
            <div>
              <h2 id="dashboard-title">반 현황</h2>
              <p>오늘 출석과 상담 메모를 한눈에 봅니다.</p>
            </div>
          </div>
          <div class="stats-grid">
            <article class="card stat-card">
              <div class="stat-top">
                <div>
                  <p class="stat-value">${state.students.length}</p>
                  <p class="stat-label">우리 반 친구들</p>
                </div>
                <svg class="stat-icon" viewBox="0 0 96 96" aria-hidden="true"><use href="#blob-blue"></use></svg>
              </div>
              <p class="stat-detail">남학생 ${genders.male} · 여학생 ${genders.female}</p>
            </article>
            <article class="card stat-card">
              <div class="stat-top">
                <div>
                  <p class="stat-value">${rate}%</p>
                  <p class="stat-label">오늘 출석률</p>
                </div>
                <svg class="stat-icon" viewBox="0 0 96 96" aria-hidden="true"><use href="#blob-green"></use></svg>
              </div>
              <p class="stat-detail status-line"><span class="indicator"></span>출석 ${counts.present} · 지각 ${counts.late} · 결석 ${counts.absent}</p>
            </article>
            <article class="card stat-card">
              <div class="stat-top">
                <div>
                  <p class="stat-value">${allergyList.length}명</p>
                  <p class="stat-label">알레르기 알림</p>
                </div>
                <svg class="stat-icon" viewBox="0 0 96 96" aria-hidden="true"><use href="#blob-yellow"></use></svg>
              </div>
              <div class="chip-list">
                ${allergyList.slice(0, 5).map((student) => `<span class="tag">${escapeHtml(student.name)}</span>`).join('')}
              </div>
            </article>
            <article class="card stat-card">
              <div class="stat-top">
                <div>
                  <p class="stat-value">${notes.length}</p>
                  <p class="stat-label">이번 주 상담 메모</p>
                </div>
                <svg class="stat-icon" viewBox="0 0 96 96" aria-hidden="true"><use href="#blob-orange"></use></svg>
              </div>
              <p class="stat-detail">${notes[0] ? `${escapeHtml(notes[0].student.name)} · ${escapeHtml(notes[0].content)}` : '아직 기록된 메모가 없습니다.'}</p>
            </article>
          </div>
        </section>

        <section class="activity-section" aria-labelledby="activity-title">
          <div class="section-head">
            <div>
              <h2 id="activity-title">최근 활동</h2>
              <p>최근 추가된 상담 메모 3건입니다.</p>
            </div>
          </div>
          <div class="activity-strip">
            ${recentNotes.map((note) => `
              <article class="card activity-card">
                <div class="activity-person">
                  ${avatar(note.student.id, 'small')}
                  <div>
                    <div class="activity-name">${escapeHtml(note.student.name)}</div>
                    <div class="activity-date">${escapeHtml(note.date)}</div>
                  </div>
                </div>
                <p class="activity-text">${escapeHtml(note.content)}</p>
              </article>
            `).join('')}
          </div>
        </section>
      `;
    }

    function filteredStudents() {
      const query = state.searchQuery.trim().toLowerCase();
      const filtered = state.students.filter((student) => {
        const matchesQuery = !query || student.name.toLowerCase().includes(query) || String(student.id).includes(query);
        const matchesGender = state.genderFilter === 'all' || student.gender === state.genderFilter;
        return matchesQuery && matchesGender;
      });

      return filtered.sort((a, b) => {
        if (state.sortBy === 'name') return a.name.localeCompare(b.name, 'ko');
        return a.id - b.id;
      });
    }

    function renderStudents() {
      const list = filteredStudents();

      return `
        <section aria-labelledby="students-title">
          <div class="section-head">
            <div>
              <h2 id="students-title">학생 목록</h2>
              <p>학생 카드를 눌러 상세 정보와 상담 메모를 확인합니다.</p>
            </div>
          </div>
          <div class="controls">
            <label class="search-wrap">
              <span class="sr-only">학생 검색</span>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="m21 21-4.7-4.7M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input class="search-input" id="studentSearch" type="search" value="${escapeHtml(state.searchQuery)}" placeholder="이름 또는 번호 검색">
            </label>
            <div class="filter-group" aria-label="성별 필터">
              <button class="filter-chip ${state.genderFilter === 'all' ? 'active' : ''}" type="button" data-action="gender-filter" data-gender="all">전체</button>
              <button class="filter-chip ${state.genderFilter === 'M' ? 'active' : ''}" type="button" data-action="gender-filter" data-gender="M">남</button>
              <button class="filter-chip ${state.genderFilter === 'F' ? 'active' : ''}" type="button" data-action="gender-filter" data-gender="F">여</button>
            </div>
            <label>
              <span class="sr-only">정렬</span>
              <select class="sort-select" id="studentSort">
                <option value="number" ${state.sortBy === 'number' ? 'selected' : ''}>번호순</option>
                <option value="name" ${state.sortBy === 'name' ? 'selected' : ''}>이름순</option>
              </select>
            </label>
          </div>
          <div class="student-grid">
            ${list.length ? list.map(renderStudentCard).join('') : '<div class="empty-state">조건에 맞는 학생이 없습니다.</div>'}
          </div>
        </section>
      `;
    }

    function renderStudentCard(student) {
      return `
        <button class="card student-card" type="button" data-action="open-student" data-id="${student.id}">
          <div class="student-card-top">
            ${avatar(student.id)}
            <span class="number-chip">${student.id}번</span>
          </div>
          <h3 class="student-name">${escapeHtml(student.name)}</h3>
          <div class="student-info-line">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 4v3M17 4v3M5 9h14M7 14h3M14 14h3M6 21h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
            <span>${birthdayLabel(student.birthday)} · ${genderLabel(student.gender)}</span>
          </div>
          ${student.allergies.length ? `<div class="chip-list">${student.allergies.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
        </button>
      `;
    }

    function renderAttendance() {
      const counts = attendanceCounts();
      const rate = attendanceRate();

      return `
        <section aria-labelledby="attendance-title">
          <div class="attendance-toolbar">
            <div>
              <h2 class="attendance-title" id="attendance-title">${todayLabel}</h2>
              <p class="attendance-summary">출석률 ${rate}% · 출석 ${counts.present}명 · 지각 ${counts.late}명 · 결석 ${counts.absent}명</p>
            </div>
            <button class="btn btn-light" type="button" data-action="mark-all-present">전체 출석으로 표시</button>
          </div>
          <div class="attendance-list">
            ${state.students.map((student) => {
              const status = state.attendance[student.id];
              return `
                <article class="attendance-row">
                  <div class="row-person">
                    ${avatar(student.id, 'tiny')}
                    <div class="row-text">
                      <strong class="row-name">${escapeHtml(student.name)}</strong>
                      <span class="row-number">${student.id}번 · ${genderLabel(student.gender)}</span>
                    </div>
                  </div>
                  <div class="attendance-toggles" aria-label="${escapeHtml(student.name)} 출석 상태">
                    <button class="status-btn present ${status === 'present' ? 'active' : ''}" type="button" data-action="attendance" data-id="${student.id}" data-status="present">출석</button>
                    <button class="status-btn late ${status === 'late' ? 'active' : ''}" type="button" data-action="attendance" data-id="${student.id}" data-status="late">지각</button>
                    <button class="status-btn absent ${status === 'absent' ? 'active' : ''}" type="button" data-action="attendance" data-id="${student.id}" data-status="absent">결석</button>
                  </div>
                </article>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function render() {
      document.querySelectorAll('[data-tab]').forEach((button) => {
        button.setAttribute('aria-selected', String(button.dataset.tab === state.activeTab));
      });

      if (state.isLoading) {
        app.innerHTML = '<div class="loading-state">구글 스프레드시트 학생 데이터를 읽는 중입니다.</div>';
        return;
      }

      if (state.loadError) {
        app.innerHTML = `<div class="loading-state">${escapeHtml(state.loadError)}</div>`;
        return;
      }

      if (state.activeTab === 'students') app.innerHTML = renderStudents();
      if (state.activeTab === 'attendance') app.innerHTML = renderAttendance();
      if (state.activeTab === 'dashboard') app.innerHTML = renderDashboard();
    }

    function renderModal() {
      const student = state.students.find((item) => item.id === state.selectedStudentId);
      if (!student) {
        modalRoot.hidden = true;
        modalRoot.innerHTML = '';
        return;
      }

      const notes = state.notes[student.id] || [];
      modalRoot.hidden = false;
      modalRoot.innerHTML = `
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <button class="btn btn-ghost modal-close" type="button" data-action="close-modal" aria-label="닫기">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="modal-head">
            ${avatar(student.id)}
            <div>
              <h2 class="modal-title" id="modal-title">${escapeHtml(student.name)}</h2>
              <p class="modal-subtitle">${student.id}번 · ${genderLabel(student.gender)} · 생일 ${birthdayLabel(student.birthday)}</p>
            </div>
          </div>

          <div class="detail-list">
            <div class="detail-row">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2A19.8 19.8 0 0 1 3.1 5.2 2 2 0 0 1 5.1 3h3a2 2 0 0 1 2 1.7l.4 2.4a2 2 0 0 1-.6 1.8L8.7 10a16 16 0 0 0 5.3 5.3l1.1-1.2a2 2 0 0 1 1.8-.6l2.4.4a2 2 0 0 1 1.7 2Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <a href="tel:${student.guardian.replaceAll('-', '')}">${escapeHtml(student.guardian)}</a>
            </div>
            <div class="detail-row">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7 11h10M7 15h7M5 21V5a2 2 0 0 1 2-2h8l4 4v14H5Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>${student.allergies.length ? student.allergies.map(escapeHtml).join(' · ') : '알레르기/특이사항 없음'}</span>
            </div>
          </div>

          <section aria-labelledby="notes-title">
            <h3 class="notes-title" id="notes-title">상담 메모</h3>
            <div class="note-list">
              ${notes.length ? notes.map((note) => `
                <article class="note-item">
                  <span class="note-date">${escapeHtml(note.date)}</span>
                  <p class="note-content">${escapeHtml(note.content)}</p>
                </article>
              `).join('') : '<article class="note-item"><p class="note-content">아직 상담 메모가 없습니다.</p></article>'}
            </div>
            <div class="ai-panel" aria-label="AI 상담 기록 도우미">
              <p class="ai-panel-title">AI 상담 기록 도우미</p>
              <div class="keyword-row" aria-label="상담 키워드">
                ${['학습태도', '교우관계', '발표', '집중력', '생활습관', '정서지원', '가정연계', '칭찬중심'].map((keyword) => `
                  <button class="keyword-btn" type="button" data-action="ai-keyword" data-keyword="${keyword}">${keyword}</button>
                `).join('')}
              </div>
              <label>
                <span class="sr-only">AI 생성 요청</span>
                <textarea class="memo-textarea" id="aiPromptInput" placeholder="예: 오늘 발표를 잘했지만 수업 중 자리 이탈이 조금 있었음. 학부모님께 부드럽게 전달하고 싶음."></textarea>
              </label>
              <div class="ai-actions">
                <span class="ai-status" id="aiStatus">키워드를 고르고 짧게 상황을 적으면 상담 기록 초안을 만듭니다.</span>
                <button class="btn btn-light" type="button" data-action="generate-note">초안 만들기</button>
              </div>
            </div>
            <form class="memo-form" data-action="save-note">
              <label>
                <span class="sr-only">새 상담 메모</span>
                <textarea class="memo-textarea" id="memoInput" placeholder="상담 기록을 직접 적거나 AI 초안을 다듬어 저장하세요."></textarea>
              </label>
              <button class="btn btn-dark" type="submit">메모 저장</button>
            </form>
          </section>
        </div>
      `;

      const input = modalRoot.querySelector('#memoInput');
      if (input) input.focus();
    }

    document.querySelector('.tabs').addEventListener('click', (event) => {
      const button = event.target.closest('[data-tab]');
      if (!button) return;
      state.activeTab = button.dataset.tab;
      render();
    });

    document.querySelector('[data-action="new-note"]').addEventListener('click', () => {
      if (state.students.length === 0) return;
      state.selectedStudentId = state.students[0].id;
      renderModal();
    });

    app.addEventListener('click', (event) => {
      const target = event.target.closest('[data-action]');
      if (!target) return;

      const { action } = target.dataset;

      if (action === 'open-student') {
        state.selectedStudentId = Number(target.dataset.id);
        renderModal();
      }

      if (action === 'gender-filter') {
        state.genderFilter = target.dataset.gender;
        render();
      }

      if (action === 'attendance') {
        state.attendance[Number(target.dataset.id)] = target.dataset.status;
        render();
      }

      if (action === 'mark-all-present') {
        state.students.forEach((student) => {
          state.attendance[student.id] = 'present';
        });
        render();
      }
    });

    app.addEventListener('input', (event) => {
      if (event.target.id === 'studentSearch') {
        state.searchQuery = event.target.value;
        renderStudentsInPlace();
      }
    });

    app.addEventListener('change', (event) => {
      if (event.target.id === 'studentSort') {
        state.sortBy = event.target.value;
        render();
      }
    });

    function renderStudentsInPlace() {
      if (state.activeTab !== 'students') return;
      const active = document.activeElement;
      const cursor = active && active.id === 'studentSearch' ? active.selectionStart : null;
      app.innerHTML = renderStudents();
      const input = document.getElementById('studentSearch');
      if (input) {
        input.focus();
        if (cursor !== null) input.setSelectionRange(cursor, cursor);
      }
    }

    modalRoot.addEventListener('click', (event) => {
      const target = event.target.closest('[data-action]');
      if (event.target === modalRoot || (target && target.dataset.action === 'close-modal')) {
        state.selectedStudentId = null;
        renderModal();
        return;
      }

      if (target && target.dataset.action === 'ai-keyword') {
        target.classList.toggle('active');
        return;
      }

      if (target && target.dataset.action === 'generate-note') {
        generateCounselingDraft(target);
      }
    });

    async function generateCounselingDraft(button) {
      const student = state.students.find((item) => item.id === state.selectedStudentId);
      if (!student) return;

      const promptInput = modalRoot.querySelector('#aiPromptInput');
      const memoInput = modalRoot.querySelector('#memoInput');
      const status = modalRoot.querySelector('#aiStatus');
      const keywords = [...modalRoot.querySelectorAll('[data-action="ai-keyword"].active')]
        .map((item) => item.dataset.keyword);
      const prompt = promptInput.value.trim();

      if (!prompt && keywords.length === 0) {
        status.textContent = '키워드를 하나 이상 고르거나 상황을 짧게 입력해 주세요.';
        return;
      }

      button.disabled = true;
      status.textContent = '상담 기록 초안을 만드는 중입니다.';

      try {
        const result = await requestJson(['/api/counseling-note', '/.netlify/functions/counseling-note'], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            student: {
              id: student.id,
              name: student.name,
              gender: genderLabel(student.gender),
              birthday: student.birthday,
              allergies: student.allergies
            },
            keywords,
            prompt
          })
        });

        memoInput.value = result.note;
        status.textContent = '초안을 만들었습니다. 표현을 확인한 뒤 저장하세요.';
        memoInput.focus();
      } catch (error) {
        status.textContent = error.message || '초안 생성 중 오류가 발생했습니다.';
      } finally {
        button.disabled = false;
      }
    }

    modalRoot.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-action="save-note"]');
      if (!form) return;
      event.preventDefault();

      const input = form.querySelector('#memoInput');
      const content = input.value.trim();
      if (!content || !state.selectedStudentId) return;

      const button = form.querySelector('button[type="submit"]');
      const savedAt = todayIso();
      button.disabled = true;

      try {
        await requestJson(['/api/student-note', '/.netlify/functions/student-note'], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            studentId: state.selectedStudentId,
            date: savedAt,
            content
          })
        });

        state.notes[state.selectedStudentId].unshift({
          date: savedAt,
          content
        });
        renderModal();
        if (state.activeTab === 'dashboard') render();
      } catch (error) {
        state.notes[state.selectedStudentId].unshift({
          date: savedAt,
          content
        });
        renderModal();
        if (state.activeTab === 'dashboard') render();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !modalRoot.hidden) {
        state.selectedStudentId = null;
        renderModal();
      }
    });

    if (isLoggedIn()) {
      showApp();
      render();
      loadStudents();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
